<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- allegedly: a quiet asterisk. footnote energy. -->
  <rect width="128" height="128" rx="22" fill="#0b0b0b"/>

  <!-- soft inner border, to feel intentional rather than empty -->
  <rect x="6" y="6" width="116" height="116" rx="18"
        fill="none" stroke="#d6a585" stroke-opacity="0.18" stroke-width="1"/>

  <g fill="#f3f3f3" transform="translate(64 64)">
    <!-- six-armed asterisk -->
    <g>
      <rect x="-4" y="-40" width="8" height="80" rx="3"/>
      <rect x="-4" y="-40" width="8" height="80" rx="3" transform="rotate(60)"/>
      <rect x="-4" y="-40" width="8" height="80" rx="3" transform="rotate(120)"/>
    </g>
    <!-- center dot for the bracket-comma vibe -->
    <circle cx="0" cy="0" r="6" fill="#0b0b0b"/>
  </g>

  <!-- footnote mark: a single warm accent dot, top-right.
       same clay tone as the popup chip and garden trigger. -->
  <circle cx="104" cy="24" r="5" fill="#d6a585" opacity="0.85"/>
</svg>

